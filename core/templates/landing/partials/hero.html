<section class="hero" id="hero">
    <!-- Canvas graph background (z-index: 1) -->
    <canvas id="hero-graph-canvas" class="hero-graph"></canvas>

    <!-- Dark gradient overlay (z-index: 5, pointer-events: none) -->
    <div class="hero-overlay"></div>

    <!-- Text content (z-index: 10) -->
    <div class="hero-content">
        <h1 style="color: var(--color-light); text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5); margin-bottom: 24px; text-align: center;">
            AI-Powered Recruitment That Actually Works
        </h1>
        <p style="color: var(--color-neutral-700); font-size: 1.125rem; text-shadow: 0 1px 4px rgba(0, 0, 0, 0.3); margin-bottom: 32px; text-align: center; max-width: 600px;">
            Built on knowledge graphs. Powered by AI. Infinitely more precise than keyword matching.
        </p>
        <div class="hero-buttons" style="display: flex; gap: 16px; justify-content: center; flex-wrap: wrap;">
            {% if ab_variant == 'B' %}
                <!-- Variant B: "Get Started Now" + "Watch Demo" -->
                <button class="btn-primary" style="background-color: var(--color-brand); color: var(--color-light); padding: 12px 32px; border-radius: 8px; border: none; font-weight: 600; font-size: 1rem; cursor: pointer; min-height: 44px; transition: all 0.2s ease;" data-ab="get-started" onclick="gtag?.('event', 'cta_click', {'button_text': 'Get Started Now', 'variant': 'B'})">
                    Get Started Now
                </button>
                <button class="btn-secondary" style="background-color: transparent; color: var(--color-accent); padding: 12px 32px; border: 2px solid var(--color-accent); border-radius: 8px; font-weight: 600; font-size: 1rem; cursor: pointer; min-height: 44px; transition: all 0.2s ease;" data-ab="watch-demo" onclick="gtag?.('event', 'cta_click', {'button_text': 'Watch Demo', 'variant': 'B'})">
                    Watch Demo
                </button>
            {% else %}
                <!-- Variant A: "Start Free Trial" + "Watch Demo" -->
                <button class="btn-primary" style="background-color: var(--color-brand); color: var(--color-light); padding: 12px 32px; border-radius: 8px; border: none; font-weight: 600; font-size: 1rem; cursor: pointer; min-height: 44px; transition: all 0.2s ease;" data-ab="start-free" onclick="gtag?.('event', 'cta_click', {'button_text': 'Start Free Trial', 'variant': 'A'})">
                    Start Free Trial
                </button>
                <button class="btn-secondary" style="background-color: transparent; color: var(--color-accent); padding: 12px 32px; border: 2px solid var(--color-accent); border-radius: 8px; font-weight: 600; font-size: 1rem; cursor: pointer; min-height: 44px; transition: all 0.2s ease;" data-ab="watch-demo" onclick="gtag?.('event', 'cta_click', {'button_text': 'Watch Demo', 'variant': 'A'})">
                    Watch Demo
                </button>
            {% endif %}
    </div>

    <style>
        .hero {
            position: relative;
            min-height: 600px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        @media (max-width: 1024px) {
            .hero {
                min-height: 500px;
            }
        }

        @media (max-width: 768px) {
            .hero {
                min-height: 400px;
            }
        }

        .hero-graph {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            background-color: var(--color-dark);
        }

        .hero-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 5;
            pointer-events: none;
            background: linear-gradient(180deg, rgba(0, 0, 0, 0.3) 0%, rgba(0, 0, 0, 0.5) 50%, rgba(0, 0, 0, 0.3) 100%);
        }

        .hero-content {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            max-width: 600px;
            text-align: center;
            color: var(--color-light);
            padding: 48px 24px;
        }

        .hero h1 {
            font-size: 3.5rem;
            font-weight: 700;
            line-height: 1.2;
            margin-bottom: 24px;
        }

        @media (max-width: 1024px) {
            .hero h1 {
                font-size: 3rem;
            }
        }

        @media (max-width: 768px) {
            .hero h1 {
                font-size: 2.5rem;
            }
        }

        @media (max-width: 480px) {
            .hero h1 {
                font-size: 2rem;
            }
        }

        .hero-buttons {
            display: flex;
            gap: 16px;
            justify-content: center;
            flex-wrap: wrap;
        }

        @media (max-width: 480px) {
            .hero-buttons {
                flex-direction: column;
                width: 100%;
            }

            .btn-primary, .btn-secondary {
                width: 100%;
            }
        }

        .btn-primary:hover {
            background-color: #0052CC;
            box-shadow: 0 8px 16px rgba(0, 102, 255, 0.3);
            transform: translateY(-2px);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-secondary:hover {
            background-color: rgba(0, 212, 170, 0.1);
            border-color: var(--color-brand);
            color: var(--color-brand);
        }
    </style>
</section>
