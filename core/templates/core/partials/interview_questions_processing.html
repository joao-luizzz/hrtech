<!-- 
Interview Questions Processing State Template
=============================================

Displayed when questions are currently being generated or another generation is in progress.

Features:
- Premium dark theme animation
- User-friendly message in Portuguese
- HTMX polling (checks every 2s if generation finished)
- Automatically swaps to display template when ready

Context variables:
- candidato: Candidato object
- vaga: Vaga object
- message (optional): Custom message (default: "Gerando perguntas...")
-->

<div id="questions-container" style="background:rgba(59,130,246,0.1); border-left:4px solid #3B82F6; color:#60A5FA; padding:16px; border-radius:8px; margin-bottom:24px; display:flex; align-items:flex-start;">
    <!-- Spinner icon -->
    <div style="margin-right:16px; margin-top:2px;">
        <span class="spinner-border spinner-border-sm" style="width:1.5rem; height:1.5rem;" role="status"></span>
    </div>
    
    <!-- Message -->
    <div style="flex-grow:1;">
        <strong style="color:#F8FAFC; display:block; margin-bottom:4px;">{{ message|default:"Gerando perguntas..." }}</strong>
        <p style="margin:0; font-size:0.9rem; color:#93C5FD;">
            Aguarde enquanto nossa IA cria perguntas personalizadas baseadas no perfil do candidato.
        </p>
    </div>
</div>

<!-- 
HTMX Polling Configuration
==========================
Reloads the same endpoint every 2 seconds until generation completes.
When complete, server returns interview_questions_display.html which replaces this template.
-->
<div 
    hx-post="{% url 'core:generate_interview_questions_htmx' vaga.id candidato.id %}"
    hx-trigger="every 2s"
    hx-target="#questions-container"
    hx-swap="outerHTML"
    hx-vals='{"force_regenerate": "false"}'
>
</div>
