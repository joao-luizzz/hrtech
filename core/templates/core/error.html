{% extends 'base.html' %}

{% block title %}Erro — HRTech{% endblock %}

{% block content %}
<div class="container d-flex flex-column align-items-center justify-content-center" style="min-height: 60vh;">
    <div class="card p-5 text-center" style="max-width: 500px; background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(239, 68, 68, 0.2); box-shadow: 0 0 20px rgba(239, 68, 68, 0.1);">
        <div class="mb-4">
            <i class="bi bi-exclamation-triangle-fill text-danger" style="font-size: 4rem;"></i>
        </div>
        <h2 class="mb-3 text-white font-weight-bold">Ops! Algo deu errado</h2>
        <p class="text-secondary mb-4">{{ message|default:"Não foi possível concluir a ação solicitada." }}</p>
        <div class="d-flex gap-3 justify-content-center">
            <a href="javascript:history.back()" class="action-btn blue border-0">
                <i class="bi bi-arrow-left"></i> Voltar
            </a>
            <a href="{% url 'core:home' %}" class="action-btn green border-0">
                <i class="bi bi-house"></i> Início
            </a>
        </div>
    </div>
</div>
{% endblock %}
