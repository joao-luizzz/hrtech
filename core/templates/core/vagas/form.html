{% extends "base.html" %}

{% block title %}{% if editing %}Editar{% else %}Nova{% endif %} Vaga - HRTech ATS{% endblock %}

{% block content %}
<div class="row justify-content-center" style="margin-top:20px;">
    <div class="col-lg-8">
        <div style="background:var(--card-bg); border-radius:12px; box-shadow:0 10px 30px rgba(0,0,0,0.2); border:1px solid #1E293B;">
            <div style="padding:24px; border-bottom:1px solid #1E293B;">
                <h5 style="margin:0; color:#F8FAFC; font-weight:800; font-size:1.4rem;">
                    <i class="bi bi-{% if editing %}pencil{% else %}plus-lg{% endif %} me-2" style="color:#3B82F6;"></i>
                    {% if editing %}Editar Vaga{% else %}Nova Vaga{% endif %}
                </h5>
            </div>
            <div style="padding:24px;">
                <form method="POST">
                    {% csrf_token %}

                    <div class="row">
                        <div class="col-md-8 mb-3">
                            <label for="titulo" style="color:#94A3B8; font-size:0.85rem; font-weight:600; margin-bottom:8px; display:block;">Título da Vaga *</label>
                            <input type="text" class="form-control" id="titulo" name="titulo"
                                   value="{{ vaga.titulo|default:'' }}" required
                                   placeholder="Ex: Desenvolvedor Python Senior"
                                   style="background:#0F172A; border:1px solid #334155; color:#fff; border-radius:8px; padding:12px;">
                        </div>
                        <div class="col-md-4 mb-3">
                            <label for="status" style="color:#94A3B8; font-size:0.85rem; font-weight:600; margin-bottom:8px; display:block;">Status</label>
                            <select class="form-select" id="status" name="status" style="background:#0F172A; border:1px solid #334155; color:#fff; border-radius:8px; padding:12px;">
                                {% for value, label in status_choices %}
                                <option value="{{ value }}" {% if vaga.status == value %}selected{% endif %}>{{ label }}</option>
                                {% endfor %}
                            </select>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="area" style="color:#94A3B8; font-size:0.85rem; font-weight:600; margin-bottom:8px; display:block;">Área *</label>
                            <input type="text" class="form-control" id="area" name="area"
                                   value="{{ vaga.area|default:'' }}" required
                                   placeholder="Ex: Backend, Dados, Frontend, DevOps"
                                   style="background:#0F172A; border:1px solid #334155; color:#fff; border-radius:8px; padding:12px;">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="senioridade" style="color:#94A3B8; font-size:0.85rem; font-weight:600; margin-bottom:8px; display:block;">Senioridade Desejada</label>
                            <select class="form-select" id="senioridade" name="senioridade" style="background:#0F172A; border:1px solid #334155; color:#fff; border-radius:8px; padding:12px;">
                                {% for value, label in senioridade_choices %}
                                <option value="{{ value }}" {% if vaga.senioridade_desejada == value %}selected{% endif %}>{{ label }}</option>
                                {% endfor %}
                            </select>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="descricao" style="color:#94A3B8; font-size:0.85rem; font-weight:600; margin-bottom:8px; display:block;">Descrição</label>
                        <textarea class="form-control" id="descricao" name="descricao" rows="4"
                                  placeholder="Descreva as responsabilidades e requisitos da vaga..."
                                  style="background:#0F172A; border:1px solid #334155; color:#fff; border-radius:8px; padding:12px;">{{ vaga.descricao|default:'' }}</textarea>
                    </div>

                    <hr style="border-color:#1E293B; margin:32px 0;">

                    <h6 style="color:#F8FAFC; margin-bottom:16px; font-weight:700;"><i class="bi bi-tools me-1" style="color:#10B981;"></i> Skills</h6>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label style="color:#94A3B8; font-size:0.85rem; font-weight:600; margin-bottom:8px; display:block;">Skills Obrigatórias</label>
                            <div id="skills-obrigatorias-container">
                                <!-- Skills serao adicionadas aqui via JS -->
                            </div>
                            <button type="button" class="action-btn" style="background:rgba(59,130,246,0.1); border-color:transparent; color:#60A5FA; margin-top:8px;" onclick="addSkill('obrigatorias')">
                                <i class="bi bi-plus-lg"></i> Adicionar Skill
                            </button>
                            <input type="hidden" name="skills_obrigatorias" id="skills_obrigatorias"
                                   value='{{ vaga.skills_obrigatorias|default:"[]"|safe }}'>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label style="color:#94A3B8; font-size:0.85rem; font-weight:600; margin-bottom:8px; display:block;">Skills Desejáveis</label>
                            <div id="skills-desejaveis-container">
                                <!-- Skills serao adicionadas aqui via JS -->
                            </div>
                            <button type="button" class="action-btn" style="background:rgba(148,163,184,0.1); border-color:transparent; color:#94A3B8; margin-top:8px;" onclick="addSkill('desejaveis')">
                                <i class="bi bi-plus-lg"></i> Adicionar Skill
                            </button>
                            <input type="hidden" name="skills_desejaveis" id="skills_desejaveis"
                                   value='{{ vaga.skills_desejaveis|default:"[]"|safe }}'>
                        </div>
                    </div>

                    <hr style="border-color:#1E293B; margin:32px 0;">

                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <a href="{% url 'core:lista_vagas' %}" class="action-btn" style="background:transparent; border-color:#334155; color:#94A3B8;">
                            <i class="bi bi-arrow-left me-1"></i> Cancelar
                        </a>
                        <button type="submit" class="action-btn blue border-0" style="padding:10px 20px;">
                            <i class="bi bi-check-lg me-1"></i>
                            {% if editing %}Salvar Alterações{% else %}Criar Vaga{% endif %}
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
let skillsObrigatorias = [];
let skillsDesejaveis = [];

document.addEventListener('DOMContentLoaded', function() {
    // Carrega skills existentes
    try {
        skillsObrigatorias = JSON.parse(document.getElementById('skills_obrigatorias').value) || [];
        skillsDesejaveis = JSON.parse(document.getElementById('skills_desejaveis').value) || [];
    } catch (e) {
        skillsObrigatorias = [];
        skillsDesejaveis = [];
    }

    renderSkills('obrigatorias');
    renderSkills('desejaveis');
});

function addSkill(tipo) {
    const skills = tipo === 'obrigatorias' ? skillsObrigatorias : skillsDesejaveis;
    skills.push({ nome: '', nivel_minimo: 3 });
    renderSkills(tipo);
    updateHiddenInput(tipo);
}

function removeSkill(tipo, index) {
    const skills = tipo === 'obrigatorias' ? skillsObrigatorias : skillsDesejaveis;
    skills.splice(index, 1);
    renderSkills(tipo);
    updateHiddenInput(tipo);
}

function updateSkill(tipo, index, field, value) {
    const skills = tipo === 'obrigatorias' ? skillsObrigatorias : skillsDesejaveis;
    if (field === 'nivel_minimo') {
        skills[index][field] = parseInt(value);
    } else {
        skills[index][field] = value;
    }
    updateHiddenInput(tipo);
}

function renderSkills(tipo) {
    const container = document.getElementById(`skills-${tipo}-container`);
    const skills = tipo === 'obrigatorias' ? skillsObrigatorias : skillsDesejaveis;

    container.innerHTML = skills.map((skill, index) => `
        <div class="input-group mb-2">
            <input type="text" class="form-control" placeholder="Nome da skill"
                   value="${skill.nome}"
                   onchange="updateSkill('${tipo}', ${index}, 'nome', this.value)"
                   style="background:#0F172A; border:1px solid #334155; color:#fff; border-radius:8px 0 0 8px;">
            <select class="form-select" style="max-width: 80px; background:#0F172A; border:1px solid #334155; border-left:none; border-right:none; color:#fff;"
                    onchange="updateSkill('${tipo}', ${index}, 'nivel_minimo', this.value)">
                <option value="1" ${skill.nivel_minimo === 1 ? 'selected' : ''}>1</option>
                <option value="2" ${skill.nivel_minimo === 2 ? 'selected' : ''}>2</option>
                <option value="3" ${skill.nivel_minimo === 3 ? 'selected' : ''}>3</option>
                <option value="4" ${skill.nivel_minimo === 4 ? 'selected' : ''}>4</option>
                <option value="5" ${skill.nivel_minimo === 5 ? 'selected' : ''}>5</option>
            </select>
            <button type="button" class="btn" style="background:rgba(239,68,68,0.1); border:1px solid #334155; border-left:none; color:#F87171; border-radius:0 8px 8px 0;" onclick="removeSkill('${tipo}', ${index})">
                <i class="bi bi-x-lg"></i>
            </button>
        </div>
    `).join('');
}

function updateHiddenInput(tipo) {
    const skills = tipo === 'obrigatorias' ? skillsObrigatorias : skillsDesejaveis;
    document.getElementById(`skills_${tipo}`).value = JSON.stringify(skills);
}
</script>
{% endblock %}
