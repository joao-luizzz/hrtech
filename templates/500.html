{% extends "base.html" %}

{% block title %}Erro interno - HRTech ATS{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 text-center py-5">
        <div class="display-1 text-danger mb-4">500</div>
        <h2 class="mb-3">Erro interno do servidor</h2>
        <p class="text-muted mb-4">
            Ocorreu um erro inesperado. Nossa equipe foi notificada e esta trabalhando para resolver.
        </p>
        <div class="d-flex gap-2 justify-content-center">
            <a href="{% url 'core:home' %}" class="btn btn-primary">
                <i class="bi bi-house me-1"></i>Ir para Home
            </a>
            <button onclick="location.reload()" class="btn btn-outline-secondary">
                <i class="bi bi-arrow-clockwise me-1"></i>Tentar novamente
            </button>
        </div>
    </div>
</div>
{% endblock %}
