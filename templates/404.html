{% extends "base.html" %}

{% block title %}Pagina nao encontrada - HRTech ATS{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 text-center py-5">
        <div class="display-1 text-muted mb-4">404</div>
        <h2 class="mb-3">Pagina nao encontrada</h2>
        <p class="text-muted mb-4">
            A pagina que voce esta procurando nao existe ou foi movida.
        </p>
        <div class="d-flex gap-2 justify-content-center">
            <a href="{% url 'core:home' %}" class="btn btn-primary">
                <i class="bi bi-house me-1"></i>Ir para Home
            </a>
            <button onclick="history.back()" class="btn btn-outline-secondary">
                <i class="bi bi-arrow-left me-1"></i>Voltar
            </button>
        </div>
    </div>
</div>
{% endblock %}
