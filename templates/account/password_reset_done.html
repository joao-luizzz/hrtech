{% extends "base.html" %}

{% block title %}Email Enviado - HRTech ATS{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow-sm">
            <div class="card-body p-5 text-center">
                <div class="mb-4">
                    <i class="bi bi-envelope-check text-primary" style="font-size: 4rem;"></i>
                </div>

                <h3 class="mb-3">Verifique seu Email</h3>

                <p class="text-muted mb-4">
                    Enviamos um email com instrucoes para redefinir sua senha.
                    Verifique sua caixa de entrada e spam.
                </p>

                <div class="alert alert-info">
                    <i class="bi bi-info-circle me-2"></i>
                    O link expira em 24 horas
                </div>

                <hr class="my-4">

                <div class="text-center">
                    <a href="{% url 'account_login' %}" class="text-decoration-none">
                        <i class="bi bi-arrow-left me-1"></i>Voltar para login
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
