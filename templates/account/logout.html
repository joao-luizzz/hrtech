{% extends "base.html" %}
{% load i18n %}

{% block title %}Logout - HRTech ATS{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow-sm">
            <div class="card-body p-4 text-center">
                <i class="bi bi-box-arrow-right text-warning" style="font-size: 3rem;"></i>
                <h3 class="mt-3">Sair</h3>
                <p class="text-muted">Tem certeza que deseja sair?</p>

                <form method="POST" action="{% url 'account_logout' %}">
                    {% csrf_token %}
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-warning btn-lg">
                            <i class="bi bi-box-arrow-right me-2"></i>Sair
                        </button>
                        <a href="{% url 'core:home' %}" class="btn btn-outline-secondary">
                            Cancelar
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
