{% extends "base.html" %}

{% block title %}Senha Redefinida - HRTech ATS{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow-sm">
            <div class="card-body p-5 text-center">
                <div class="mb-4">
                    <i class="bi bi-check-circle-fill text-success" style="font-size: 4rem;"></i>
                </div>

                <h3 class="mb-3">Senha Redefinida!</h3>

                <p class="text-muted mb-4">
                    Sua senha foi alterada com sucesso. Agora voce pode entrar com sua nova senha.
                </p>

                <div class="d-grid gap-2">
                    <a href="{% url 'account_login' %}" class="btn btn-primary btn-lg">
                        <i class="bi bi-box-arrow-in-right me-2"></i>Fazer Login
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
