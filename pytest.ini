[pytest]
DJANGO_SETTINGS_MODULE = hrtech.settings_test
python_files = test_*.py
python_classes = Test*
python_functions = test_*
testpaths = core/tests
addopts = --cov=core.services --cov=core.models --cov=core.views --cov=core.decorators --cov-report=html --cov-report=term-missing -v --tb=short
norecursedirs = .git .tox build dist *.egg venv .venv
asyncio_mode = auto
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
    e2e: marks tests as end-to-end tests
    performance: marks tests as performance benchmarks
